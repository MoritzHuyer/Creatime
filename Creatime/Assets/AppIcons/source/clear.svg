<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024"
     xmlns="http://www.w3.org/2000/svg">
  <title>Creatime — Clear (Glass)</title>
  <desc>Clear glass variant. Translucent feel, lighter ring, same scoop.</desc>

  <defs>
    <linearGradient id="bgClear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2F3FB"/>
      <stop offset="0.55" stop-color="#E6E8F8"/>
      <stop offset="1" stop-color="#D9DCF2"/>
    </linearGradient>
    <radialGradient id="sheenClear" cx="0.32" cy="0.18" r="0.62">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" rx="225" ry="225" fill="url(#bgClear)"/>
  <rect width="1024" height="1024" rx="225" ry="225" fill="url(#sheenClear)"/>

  <!-- Hellerer Orange-Ton für die Glass-Variante. -->
  <g transform="rotate(-90 512 512)">
    <circle cx="512" cy="512" r="285" fill="none"
            stroke="#FFA468" stroke-width="46"
            stroke-linecap="round"
            stroke-dasharray="1343 447"/>
  </g>
  <g transform="rotate(-90 512 512)" opacity="0.35">
    <circle cx="512" cy="512" r="285" fill="none"
            stroke="#FFD2A8" stroke-width="64"
            stroke-linecap="round"
            stroke-dasharray="1343 447"/>
  </g>

  <g transform="translate(512, 540)">
    <path d="M -82 -16
             C -82 -52, -52 -68, -18 -68
             L 60 -68
             C 96 -68, 114 -50, 114 -16
             L 114 28
             C 114 72, 58 98, 14 98
             C -52 98, -82 72, -82 28 Z"
          fill="#FFFFFF"/>
    <path d="M -52 -42
             C -38 -52, -18 -58, -2 -56
             L -52 -28 Z"
          fill="#FFFFFF" opacity="0.75"/>
  </g>
</svg>
